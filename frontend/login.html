<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOCKLINE - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-bg-decor"></div>
    <div class="glass-panel auth-card ambient-shadow text-center">
      <h1 class="brand-logo gradient-text">STOCKLINE</h1>
      <p class="tagline mb-4">Smart Stock. Zero Chaos.</p>
      
      <div id="alert-container"></div>

      <form id="loginForm" class="text-start">
        <div class="mb-3">
          <label class="input-label" for="email">Email Address</label>
          <input type="email" class="form-control" id="email" required placeholder="name@college.edu">
        </div>
        <div class="mb-4">
          <label class="input-label" for="password">Password</label>
          <input type="password" class="form-control" id="password" required placeholder="Enter password">
        </div>
        
        <button type="submit" class="btn btn-primary-custom w-100 mb-3 gradient-bg" id="loginBtn">Sign In</button>
      </form>
      
      <div class="mt-4 tagline">
        Don't have an account? <a href="register.html" class="text-decoration-none fw-semibold" style="color: var(--surface-tint)">Register here</a>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (isAuthenticated()) {
        window.location.href = 'dashboard.html';
      }

      const form = document.getElementById('loginForm');
      const btn = document.getElementById('loginBtn');
      const alertContainer = document.getElementById('alert-container');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertContainer.innerHTML = '';
        btn.disabled = true;
        btn.innerHTML = 'Signing In...';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
          // Mock login if server is down, otherwise uncomment next lines:
          // const response = await fetchAPI('/auth/login', {
          //   method: 'POST',
          //   body: JSON.stringify({ email, password })
          // });
          
          // MOCK IMPLEMENTATION START (remove this section when API is ready)
          let response = { token: 'mock-jwt-token', user: { name: 'Demo User', role: 'Student', email: email } };
          if(email.includes('admin')) response.user.role = 'Admin';
          if(email.includes('employee')) response.user.role = 'Employee';
          await new Promise(r => setTimeout(r, 600)); // fake delay
          // MOCK IMPLEMENTATION END

          setAuth(response.token, response.user);
          window.location.href = 'dashboard.html';
        } catch (err) {
          alertContainer.innerHTML = buildAlertUI(err.message, 'error');
          btn.disabled = false;
          btn.innerHTML = 'Sign In';
        }
      });
    });
  </script>
</body>
</html>
