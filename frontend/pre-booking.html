<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOCKLINE - Pre-Bookings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

  <!-- Common Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom ambient-shadow">
    <div class="container-fluid">
      <a class="navbar-brand brand-logo gradient-text" href="dashboard.html">STOCKLINE</a>
      <span class="tagline d-none d-md-inline ms-2">Smart Stock. Zero Chaos.</span>
      
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class='bx bx-menu fs-3'></i>
      </button>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center gap-loose">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="inventory.html">Inventory</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="pre-booking.html">Pre-Bookings</a>
          </li>
          <li class="nav-item d-none" id="nav-management">
            <a class="nav-link" href="stock-management.html">Management</a>
          </li>
          
          <div id="nav-right" class="d-flex align-items-center gap-3 ms-3">
             <!-- Populated by script.js -->
          </div>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row g-5">
      <!-- Create Booking Form -->
      <div class="col-lg-4">
        <h2 class="display-sm mb-4">New Pre-Booking</h2>
        <div class="card surface-lowest ambient-shadow p-4">
          <div id="alert-container-form"></div>
          <form id="prebookForm">
            <div class="mb-3">
              <label class="input-label">Select Book</label>
              <select class="form-select" id="bookSelect" required>
                <option value="">Choose an out-of-stock book...</option>
                <option value="103">Advanced Calculus</option>
                <option value="104">Design Patterns</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="input-label">Notification Email (Optional)</label>
              <input type="email" class="form-control" id="notifyEmail" placeholder="Will use account email if blank">
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 gradient-bg"><i class='bx bx-bookmark-plus'></i> Confirm Pre-Book</button>
          </form>
        </div>
      </div>

      <!-- Booking History -->
      <div class="col-lg-8">
        <h2 class="display-sm mb-4">Your Queue Status</h2>
        <div id="alert-container-history"></div>
        <div class="card surface-lowest ambient-shadow p-4">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Book Title</th>
                  <th>Request Date</th>
                  <th>Queue Position</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="bookingsTableBody">
                <tr><td colspan="5" class="text-center text-muted py-4">Loading bookings...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = enforceAuth();
      if(!user) return;

      if(user.role === 'Admin' || user.role === 'Employee') {
        document.getElementById('nav-management').classList.remove('d-none');
      }

      // Check URL for ?bookId=xxx
      const params = new URLSearchParams(window.location.search);
      if(params.has('bookId')) {
        const sel = document.getElementById('bookSelect');
        sel.value = params.get('bookId');
      }

      await loadBookings();

      document.getElementById('prebookForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertCont = document.getElementById('alert-container-form');
        try {
          // Mock post booking
          const bookId = document.getElementById('bookSelect').value;
          await new Promise(r => setTimeout(r, 400));
          alertCont.innerHTML = buildAlertUI('Pre-booking successful! Queue position: #3', 'success');
          loadBookings();
        } catch(err) {
          alertCont.innerHTML = buildAlertUI('Failed to create pre-booking');
        }
      });
    });

    async function loadBookings() {
      try {
        // Mock data
        const bookings = [
          { id: 41, title: 'Advanced Calculus', date: '2026-04-09', queue: 3, status: 'Waiting' },
          { id: 42, title: 'Design Patterns', date: '2026-04-08', queue: 1, status: 'Ready for Pickup' }
        ];

        const tbody = document.getElementById('bookingsTableBody');
        tbody.innerHTML = '';

        bookings.forEach(b => {
          let statClass = b.status === 'Waiting' ? 'status-yellow' : 'status-green';
          let cancelBtn = b.status === 'Waiting' ? 
            `<button class="btn btn-sm text-danger border-0" onclick="cancel(${b.id})">Cancel</button>` : '-';

          tbody.innerHTML += `
            <tr>
              <td class="fw-bold">${b.title}</td>
              <td class="text-muted small">${b.date}</td>
              <td class="fw-semibold">#${b.queue}</td>
              <td><span class="status-chip ${statClass}">${b.status}</span></td>
              <td>${cancelBtn}</td>
            </tr>
          `;
        });
      } catch(e) {
        document.getElementById('alert-container-history').innerHTML = buildAlertUI('Failed to load history');
      }
    }

    function cancel(id) {
       if(confirm('Cancel this pre-booking?')) {
          alert('Mock: Canceled record ' + id);
          loadBookings();
       }
    }
  </script>
</body>
</html>
