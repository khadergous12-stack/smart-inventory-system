<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOCKLINE - Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

  <!-- Common Navbar -->
  <nav class="navbar navbar-expand-lg navbar-custom ambient-shadow">
    <div class="container-fluid">
      <a class="navbar-brand brand-logo gradient-text" href="dashboard.html">STOCKLINE</a>
      <span class="tagline d-none d-md-inline ms-2">Smart Stock. Zero Chaos.</span>
      
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class='bx bx-menu fs-3'></i>
      </button>
      
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center gap-loose">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="inventory.html">Inventory</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="pre-booking.html">Pre-Bookings</a>
          </li>
          <li class="nav-item d-none" id="nav-management">
            <a class="nav-link" href="stock-management.html">Management</a>
          </li>
          
          <div id="nav-right" class="d-flex align-items-center gap-3 ms-3">
             <!-- Populated by script.js -->
          </div>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <div>
        <h1 class="display-lg">Inventory</h1>
        <p class="tagline">Browse library catalog and real-time stock levels.</p>
      </div>
      <div class="d-none" id="adminActions">
        <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addBookModal">
          <i class='bx bx-plus'></i> Add Book
        </button>
      </div>
    </div>

    <div id="alert-container"></div>

    <div class="card surface-lowest ambient-shadow p-4 mb-4">
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Book Title & Author</th>
              <th>Status</th>
              <th>Next Arrival</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody id="inventoryTableBody">
            <tr><td colspan="5" class="text-center text-muted py-4">Loading inventory...</td></tr>
          </tbody>
        </table>
      </div>
      
      <!-- Pagination -->
      <div class="d-flex justify-content-between align-items-center mt-4">
        <div class="tagline" id="pageInfo">Showing page 1 of 1</div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-secondary-custom" id="btnPrev">Previous</button>
          <button class="btn btn-sm btn-secondary-custom" id="btnNext">Next</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal (Admin Only) -->
  <div class="modal fade" id="addBookModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content surface-lowest border-0 p-3">
        <div class="modal-header border-0">
          <h5 class="modal-title font-display fw-bold">Add New Book</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="bookForm">
            <div class="mb-3">
              <label class="input-label">Title</label>
              <input type="text" class="form-control" id="bookTitle" required>
            </div>
            <div class="mb-3">
              <label class="input-label">Author</label>
              <input type="text" class="form-control" id="bookAuthor" required>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="input-label">Initial Stock</label>
                <input type="number" class="form-control" id="bookStock" required min="0">
              </div>
              <div class="col-6 mb-3">
                <label class="input-label">Price (Optional)</label>
                <input type="number" step="0.01" class="form-control" id="bookPrice">
              </div>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 mt-3 gradient-bg">Save Book</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentPage = 1;

    document.addEventListener('DOMContentLoaded', async () => {
      const user = enforceAuth();
      if(!user) return;

      if(user.role === 'Admin') {
        document.getElementById('adminActions').classList.remove('d-none');
      }
      if(user.role === 'Admin' || user.role === 'Employee') {
        document.getElementById('nav-management').classList.remove('d-none');
      }

      await loadInventory(currentPage);

      document.getElementById('btnPrev').addEventListener('click', () => {
        if(currentPage > 1) { currentPage--; loadInventory(currentPage); }
      });
      document.getElementById('btnNext').addEventListener('click', () => {
        currentPage++; loadInventory(currentPage);
      });
    });

    async function loadInventory(page) {
      const user = getUser();
      try {
        // MOCK DATA
        const items = [
          { id: 101, title: 'Introduction to Algorithms', author: 'Thomas H. Cormen', stock: 2, nextStock: '2026-04-12' },
          { id: 102, title: 'Clean Code', author: 'Robert C. Martin', stock: 35, nextStock: null },
          { id: 103, title: 'Advanced Calculus', author: 'David V. Widder', stock: 0, nextStock: '2026-04-15' },
          { id: 104, title: 'Design Patterns', author: 'Erich Gamma', stock: 0, nextStock: '2026-04-11' },
          { id: 105, title: 'Physics for Scientists', author: 'Raymond A. Serway', stock: 12, nextStock: null }
        ];
        
        const tbody = document.getElementById('inventoryTableBody');
        tbody.innerHTML = '';
        
        items.forEach(item => {
          const status = getStockColor(item.stock);
          const arrival = formatCountdown(item.nextStock);
          
          let actionBtns = '';
          if (item.stock === 0) {
             actionBtns = `<a href="pre-booking.html?bookId=${item.id}" class="btn btn-sm btn-primary-custom" style="padding: 0.25rem 0.75rem;">Pre-Book</a>`;
          } else {
             actionBtns = `<button class="btn btn-sm btn-secondary-custom" disabled>Available</button>`;
          }

          if (user.role === 'Admin') {
            actionBtns += `<button class="btn btn-sm text-danger border-0 ms-2" onclick="deleteBook(${item.id})"><i class='bx bx-trash'></i></button>`;
          }

          tbody.innerHTML += `
            <tr>
              <td class="text-muted fw-semibold">#${item.id}</td>
              <td>
                <div class="fw-bold">${item.title}</div>
                <div class="small text-muted">${item.author}</div>
              </td>
              <td><span class="status-chip ${status.class}">${status.label} (${item.stock})</span></td>
              <td class="small fw-semibold" style="color: var(--on-surface-variant)"><i class='bx bx-calendar-event'></i> ${arrival}</td>
              <td class="text-end">${actionBtns}</td>
            </tr>
          `;
        });
        
        document.getElementById('pageInfo').innerText = `Showing page ${page} of 5`; // Mock pagination meta

      } catch(e) {
        document.getElementById('alert-container').innerHTML = buildAlertUI('Failed to load inventory.');
      }
    }

    function deleteBook(id) {
       if(confirm('Are you sure you want to delete this book?')) {
          alert('Mock: Deleted book ' + id);
       }
    }
  </script>
</body>
</html>
